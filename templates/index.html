<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연구비 처리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --success: #10b981;
      --border: #e5e7eb;
    }
    body { background: #f8fafc; font-family: 'Segoe UI', sans-serif; color: #1e293b; }

    /* Category */
    .category-header {
      font-size: .8rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: .4rem .2rem;
      border-bottom: 2px solid var(--border);
      margin-bottom: .8rem;
    }

    /* Type Cards */
    .type-card {
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 1rem .75rem;
      cursor: pointer;
      transition: all .18s;
      text-align: center;
      background: #fff;
      height: 100%;
    }
    .type-card:hover  { border-color: var(--primary); background: var(--primary-light); }
    .type-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .type-card .icon  { font-size: 1.6rem; }
    .type-card .label { font-size: .78rem; font-weight: 600; margin-top: .35rem; line-height: 1.3; }

    /* Upload */
    #upload-section { display: none; }
    .doc-card {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1rem;
      background: #fff;
      transition: border-color .2s;
    }
    .doc-card.has-file { border-color: var(--success); border-style: solid; }
    .doc-title { font-weight: 600; font-size: .88rem; }
    .badge-required { font-size: .68rem; background: #fee2e2; color: #dc2626; border-radius: 6px; padding: 2px 6px; }
    .badge-optional  { font-size: .68rem; background: #f3f4f6; color: #6b7280; border-radius: 6px; padding: 2px 6px; }

    .drop-zone {
      border: 1.5px dashed #c7d2fe;
      border-radius: 8px;
      padding: .65rem;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
      font-size: .78rem;
      color: #94a3b8;
      transition: background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: var(--primary-light); border-color: var(--primary); }

    .file-item {
      display: flex; justify-content: space-between; align-items: center;
      background: #f8fafc; border-radius: 6px;
      padding: .3rem .6rem; font-size: .75rem; margin-top: .3rem;
    }
    .remove-btn { cursor: pointer; color: #ef4444; border: none; background: none; font-size: .85rem; }

    /* Merge */
    .btn-merge {
      background: var(--primary); color: #fff; border: none;
      border-radius: 10px; padding: .7rem 2.2rem;
      font-size: .95rem; font-weight: 600; transition: background .2s;
    }
    .btn-merge:hover    { background: #4338ca; color: #fff; }
    .btn-merge:disabled { background: #a5b4fc; cursor: not-allowed; }

    .step-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 26px; height: 26px; background: var(--primary); color: #fff;
      border-radius: 50%; font-size: .78rem; font-weight: 700; margin-right: .5rem; flex-shrink: 0;
    }

    /* Info button */
    .info-btn {
      position: absolute; top: 6px; right: 8px;
      background: none; border: none; cursor: pointer;
      font-size: .85rem; color: #94a3b8; padding: 0; line-height: 1;
    }
    .info-btn:hover { color: var(--primary); }
    .type-card { position: relative; }

    /* Toast */
    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    .toast-msg {
      background: #1e293b; color: #fff; padding: .7rem 1.1rem;
      border-radius: 10px; font-size: .82rem; margin-top: .4rem;
      box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: fadeIn .3s;
    }
    .toast-msg.error { background: #dc2626; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom px-4 py-3">
  <span class="navbar-brand fw-bold">📋 연구비 처리 시스템</span>
</nav>

<div class="container py-5" style="max-width:960px;">

  <!-- Step 1: 비용 유형 선택 -->
  <div class="mb-5">
    <div class="d-flex align-items-center mb-3">
      <span class="step-badge">1</span>
      <span class="fw-semibold">비용 유형 선택</span>
    </div>

    {% for cat_name, cat_info in categories.items() %}
    <div class="mb-4">
      <div class="category-header">{{ cat_info.icon }} {{ cat_name }}</div>
      <div class="row g-2">
        {% for key, info in cat_info.types.items() %}
        <div class="col-6 col-md-3 col-lg-2">
          <div class="type-card" data-type="{{ key }}" data-docs='{{ info.documents | tojson }}'>
            {% if key in descriptions %}
            <button class="info-btn" onclick="showDesc(event,'{{ key }}')">ℹ️</button>
            {% endif %}
            <div class="icon">{{ info.icon }}</div>
            <div class="label">{{ info.name }}</div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
    {% endfor %}
  </div>

  <!-- Step 2: 파일 업로드 -->
  <div id="upload-section" class="mb-5">
    <div class="d-flex align-items-center mb-3">
      <span class="step-badge">2</span>
      <span class="fw-semibold">파일 업로드</span>
      <span class="ms-2 text-muted" id="type-name-label" style="font-size:.83rem;"></span>
    </div>
    <div id="doc-list" class="row g-3"></div>
  </div>

  <!-- Step 3: 병합 -->
  <div id="merge-section" style="display:none;">
    <div class="d-flex align-items-center mb-3">
      <span class="step-badge">3</span>
      <span class="fw-semibold">PDF 병합</span>
    </div>
    <button class="btn btn-merge" id="merge-btn" onclick="doMerge()">📄 PDF 병합하기</button>
    <div id="merge-loading" class="mt-3 text-muted" style="display:none; font-size:.88rem;">⏳ 병합 중...</div>
  </div>

</div>

<!-- Description Modal -->
<div class="modal fade" id="descModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="descModalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="descModalBody" style="font-size:.88rem; line-height:1.7;"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const DESCRIPTIONS = {{ descriptions | tojson | safe }};
  const TYPE_NAMES = {
    {% for cat_name, cat_info in categories.items() %}
    {% for key, info in cat_info.types.items() %}
    '{{ key }}': '{{ info.name }}',
    {% endfor %}{% endfor %}
  };

  function showDesc(e, typeKey) {
    e.stopPropagation();
    document.getElementById('descModalTitle').textContent = TYPE_NAMES[typeKey] || typeKey;
    document.getElementById('descModalBody').innerHTML = DESCRIPTIONS[typeKey] || '';
    new bootstrap.Modal(document.getElementById('descModal')).show();
  }

  let selectedType = null;
  let selectedDocs = [];
  const fileStore  = {};

  // ── Type selection ──────────────────────────────────────────────────────────
  document.querySelectorAll('.type-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedType = card.dataset.type;
      selectedDocs = JSON.parse(card.dataset.docs);
      Object.keys(fileStore).forEach(k => delete fileStore[k]);
      renderDocs();
      // Scroll to upload section
      document.getElementById('upload-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // ── Render upload cards ─────────────────────────────────────────────────────
  function renderDocs() {
    document.getElementById('upload-section').style.display = 'block';
    document.getElementById('merge-section').style.display  = 'block';
    document.getElementById('type-name-label').textContent  =
      '— ' + document.querySelector('.type-card.selected .label').textContent;
    const list = document.getElementById('doc-list');
    list.innerHTML = '';

    selectedDocs.forEach(doc => {
      fileStore[doc.id] = fileStore[doc.id] || [];
      const col = document.createElement('div');
      col.className = 'col-12 col-md-6';
      col.innerHTML = `
        <div class="doc-card" id="card-${doc.id}">
          <div class="d-flex align-items-center mb-2">
            <span class="doc-title">${doc.name}</span>
          </div>
          <div class="drop-zone" id="drop-${doc.id}"
               onclick="document.getElementById('input-${doc.id}').click()">
            클릭 또는 파일을 드래그
          </div>
          <input type="file" id="input-${doc.id}" multiple accept="${doc.accept}" style="display:none"
                 onchange="handleFiles('${doc.id}', this.files)">
          <div id="files-${doc.id}"></div>
        </div>`;
      list.appendChild(col);

      const zone = document.getElementById(`drop-${doc.id}`);
      zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('dragover');
        handleFiles(doc.id, e.dataTransfer.files);
      });
    });
  }

  function handleFiles(docId, files) {
    Array.from(files).forEach(f => fileStore[docId].push(f));
    refreshFileList(docId);
  }

  function refreshFileList(docId) {
    const container = document.getElementById(`files-${docId}`);
    const card      = document.getElementById(`card-${docId}`);
    container.innerHTML = '';
    fileStore[docId].forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `<span>📄 ${f.name}</span>
        <button class="remove-btn" onclick="removeFile('${docId}',${i})">✕</button>`;
      container.appendChild(item);
    });
    card.classList.toggle('has-file', fileStore[docId].length > 0);
  }

  function removeFile(docId, idx) {
    fileStore[docId].splice(idx, 1);
    refreshFileList(docId);
  }

  // ── Merge ───────────────────────────────────────────────────────────────────
  async function doMerge() {
    if (!selectedType) return toast('비용 유형을 선택해주세요.', true);
    for (const doc of selectedDocs) {
      if (doc.required && (!fileStore[doc.id] || fileStore[doc.id].length === 0))
        return toast(`'${doc.name}' 파일이 필요합니다.`, true);
    }
    const form = new FormData();
    form.append('expense_type', selectedType);
    selectedDocs.forEach(doc => (fileStore[doc.id] || []).forEach(f => form.append(doc.id, f)));

    const btn = document.getElementById('merge-btn');
    const loading = document.getElementById('merge-loading');
    btn.disabled = true; loading.style.display = 'block';

    try {
      const res = await fetch('/merge', { method: 'POST', body: form });
      if (!res.ok) { toast((await res.json()).error || '오류가 발생했습니다.', true); return; }
      const blob = await res.blob();
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^;"'\n]+)/i);
      const filename = match ? decodeURIComponent(match[1]) : 'merged.pdf';
      const url = URL.createObjectURL(blob);
      Object.assign(document.createElement('a'), { href: url, download: filename }).click();
      URL.revokeObjectURL(url);
      toast('✅ PDF 병합 완료! 다운로드를 확인하세요.');
    } catch { toast('네트워크 오류가 발생했습니다.', true); }
    finally { btn.disabled = false; loading.style.display = 'none'; }
  }

  // ── Toast ───────────────────────────────────────────────────────────────────
  function toast(msg, isError = false) {
    const el = document.createElement('div');
    el.className = 'toast-msg' + (isError ? ' error' : '');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
</script>
</body>
</html>
