<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>연구비 처리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #eef2ff;
      --success: #10b981;
      --border: #e5e7eb;
    }

    body {
      background: #f8fafc;
      font-family: 'Segoe UI', sans-serif;
      color: #1e293b;
    }

    .navbar-brand { font-weight: 700; font-size: 1.2rem; }

    /* Type Cards */
    .type-card {
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem 1rem;
      cursor: pointer;
      transition: all .2s;
      text-align: center;
      background: #fff;
    }
    .type-card:hover { border-color: var(--primary); background: var(--primary-light); }
    .type-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .type-card .icon { font-size: 2rem; }
    .type-card .label { font-size: .9rem; font-weight: 600; margin-top: .4rem; }

    /* Upload Section */
    #upload-section { display: none; }

    .doc-card {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 1.2rem;
      background: #fff;
      transition: border-color .2s;
    }
    .doc-card.has-file { border-color: var(--success); border-style: solid; }
    .doc-card .doc-title { font-weight: 600; font-size: .95rem; }
    .doc-card .badge-required { font-size: .7rem; background: #fee2e2; color: #dc2626; border-radius: 6px; padding: 2px 7px; }
    .doc-card .badge-optional { font-size: .7rem; background: #f3f4f6; color: #6b7280; border-radius: 6px; padding: 2px 7px; }

    .drop-zone {
      border: 1.5px dashed #c7d2fe;
      border-radius: 8px;
      padding: .8rem;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
      font-size: .82rem;
      color: #94a3b8;
      transition: background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: var(--primary-light); border-color: var(--primary); }

    .file-list { margin-top: .5rem; }
    .file-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fafc;
      border-radius: 6px;
      padding: .35rem .7rem;
      font-size: .8rem;
      margin-top: .3rem;
    }
    .file-item .remove-btn { cursor: pointer; color: #ef4444; border: none; background: none; font-size: .9rem; }

    /* Merge Button */
    .btn-merge {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .75rem 2.5rem;
      font-size: 1rem;
      font-weight: 600;
      transition: background .2s;
    }
    .btn-merge:hover { background: #4338ca; color: #fff; }
    .btn-merge:disabled { background: #a5b4fc; cursor: not-allowed; }

    .step-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      font-size: .8rem;
      font-weight: 700;
      margin-right: .5rem;
      flex-shrink: 0;
    }

    #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
    .toast-msg {
      background: #1e293b;
      color: #fff;
      padding: .75rem 1.2rem;
      border-radius: 10px;
      font-size: .85rem;
      margin-top: .5rem;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      animation: fadeIn .3s;
    }
    .toast-msg.error { background: #dc2626; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }
  </style>
</head>
<body>

<nav class="navbar navbar-light bg-white border-bottom px-4 py-3">
  <span class="navbar-brand">📋 연구비 처리 시스템</span>
</nav>

<div class="container py-5" style="max-width: 860px;">

  <!-- Step 1: 이름 입력 -->
  <div class="mb-4">
    <div class="d-flex align-items-center mb-2">
      <span class="step-badge">1</span>
      <span class="fw-semibold">이름 입력</span>
    </div>
    <input type="text" id="person-name" class="form-control" style="max-width:280px;"
           placeholder="홍길동" autocomplete="off">
  </div>

  <!-- Step 2: 비용 유형 선택 -->
  <div class="mb-4">
    <div class="d-flex align-items-center mb-3">
      <span class="step-badge">2</span>
      <span class="fw-semibold">비용 유형 선택</span>
    </div>
    <div class="row g-3" id="type-grid">
      {% for key, info in expense_types.items() %}
      <div class="col-6 col-md-3">
        <div class="type-card" data-type="{{ key }}" data-docs='{{ info.documents | tojson }}'>
          <div class="icon">{{ info.icon }}</div>
          <div class="label">{{ info.name }}</div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <!-- Step 3: 파일 업로드 -->
  <div id="upload-section" class="mb-4">
    <div class="d-flex align-items-center mb-3">
      <span class="step-badge">3</span>
      <span class="fw-semibold">파일 업로드</span>
      <span class="ms-2 text-muted" id="type-name-label" style="font-size:.85rem;"></span>
    </div>
    <div id="doc-list" class="row g-3"></div>
  </div>

  <!-- Step 4: 병합 -->
  <div id="merge-section" style="display:none;">
    <div class="d-flex align-items-center mb-3">
      <span class="step-badge">4</span>
      <span class="fw-semibold">PDF 병합</span>
    </div>
    <button class="btn btn-merge" id="merge-btn" onclick="doMerge()">
      📄 PDF 병합하기
    </button>
    <div id="merge-loading" class="mt-3 text-muted" style="display:none; font-size:.9rem;">
      ⏳ 병합 중...
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script>
  let selectedType = null;
  let selectedDocs = [];
  const fileStore = {}; // docId → FileList array

  // ── Type card selection ──────────────────────────────────────────────────────
  document.querySelectorAll('.type-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedType = card.dataset.type;
      selectedDocs = JSON.parse(card.dataset.docs);
      Object.keys(fileStore).forEach(k => delete fileStore[k]);
      renderDocs();
    });
  });

  // ── Render upload sections ───────────────────────────────────────────────────
  function renderDocs() {
    const section = document.getElementById('upload-section');
    const list    = document.getElementById('doc-list');
    const label   = document.getElementById('type-name-label');
    const mergeSection = document.getElementById('merge-section');

    section.style.display = 'block';
    mergeSection.style.display = 'block';
    label.textContent = '— ' + document.querySelector('.type-card.selected .label').textContent;
    list.innerHTML = '';

    selectedDocs.forEach(doc => {
      fileStore[doc.id] = fileStore[doc.id] || [];
      const col = document.createElement('div');
      col.className = 'col-12 col-md-6';
      col.innerHTML = `
        <div class="doc-card" id="card-${doc.id}">
          <div class="d-flex align-items-center mb-2">
            <span class="doc-title me-2">${doc.name}</span>
            <span class="${doc.required ? 'badge-required' : 'badge-optional'}">
              ${doc.required ? '필수' : '선택'}
            </span>
          </div>
          <div class="drop-zone" id="drop-${doc.id}"
               onclick="document.getElementById('input-${doc.id}').click()">
            클릭 또는 파일을 여기에 드래그
          </div>
          <input type="file" id="input-${doc.id}" multiple accept="${doc.accept}" style="display:none"
                 onchange="handleFiles('${doc.id}', this.files)">
          <div class="file-list" id="files-${doc.id}"></div>
        </div>`;
      list.appendChild(col);

      // Drag & drop
      const zone = document.getElementById(`drop-${doc.id}`);
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('dragover');
        handleFiles(doc.id, e.dataTransfer.files);
      });
    });
  }

  // ── File handling ────────────────────────────────────────────────────────────
  function handleFiles(docId, files) {
    Array.from(files).forEach(f => fileStore[docId].push(f));
    refreshFileList(docId);
  }

  function refreshFileList(docId) {
    const container = document.getElementById(`files-${docId}`);
    const card      = document.getElementById(`card-${docId}`);
    container.innerHTML = '';
    fileStore[docId].forEach((f, i) => {
      const item = document.createElement('div');
      item.className = 'file-item';
      item.innerHTML = `<span>📄 ${f.name}</span>
        <button class="remove-btn" onclick="removeFile('${docId}', ${i})">✕</button>`;
      container.appendChild(item);
    });
    card.classList.toggle('has-file', fileStore[docId].length > 0);
  }

  function removeFile(docId, idx) {
    fileStore[docId].splice(idx, 1);
    refreshFileList(docId);
  }

  // ── Merge ────────────────────────────────────────────────────────────────────
  async function doMerge() {
    const name = document.getElementById('person-name').value.trim();
    if (!name)           return toast('이름을 입력해주세요.', true);
    if (!selectedType)   return toast('비용 유형을 선택해주세요.', true);

    // Required check
    for (const doc of selectedDocs) {
      if (doc.required && (!fileStore[doc.id] || fileStore[doc.id].length === 0)) {
        return toast(`'${doc.name}' 파일이 필요합니다.`, true);
      }
    }

    const form = new FormData();
    form.append('expense_type', selectedType);
    form.append('person_name', name);
    selectedDocs.forEach(doc => {
      (fileStore[doc.id] || []).forEach(f => form.append(doc.id, f));
    });

    const btn = document.getElementById('merge-btn');
    const loading = document.getElementById('merge-loading');
    btn.disabled = true;
    loading.style.display = 'block';

    try {
      const res = await fetch('/merge', { method: 'POST', body: form });
      if (!res.ok) {
        const err = await res.json();
        toast(err.error || '오류가 발생했습니다.', true);
        return;
      }
      const blob = await res.blob();
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename\*?=(?:UTF-8'')?["']?([^;"'\n]+)/i);
      const filename = match ? decodeURIComponent(match[1]) : 'merged.pdf';
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
      toast('✅ PDF 병합 완료! 다운로드를 확인하세요.');
    } catch (e) {
      toast('네트워크 오류가 발생했습니다.', true);
    } finally {
      btn.disabled = false;
      loading.style.display = 'none';
    }
  }

  // ── Toast ─────────────────────────────────────────────────────────────────────
  function toast(msg, isError = false) {
    const el = document.createElement('div');
    el.className = 'toast-msg' + (isError ? ' error' : '');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
</script>
</body>
</html>
