<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — 연구비 처리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8fafc; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .box {
      background: #fff; border-radius: 16px; padding: 2.5rem 2rem;
      width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .logo-area { text-align: center; margin-bottom: 1.75rem; }
    .logo-area img  { height: 48px; object-fit: contain; margin-bottom: .6rem; }
    .logo-area h5   { font-size: .95rem; font-weight: 700; color: #475569; margin: 0; }
    .logo-area small{ font-size: .78rem; color: #94a3b8; }

    .form-label { font-size: .83rem; font-weight: 600; color: #334155; }
    .form-control {
      border-radius: 8px; border: 1.5px solid #e2e8f0;
      font-size: .88rem; padding: .6rem .85rem;
    }
    .form-control:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.1); }
    .form-control.is-valid   { border-color: #10b981; background-image: none; }
    .form-control.is-invalid { border-color: #ef4444; background-image: none; }

    .input-group .form-control { border-right: none; border-radius: 8px 0 0 8px; }
    .input-group-text {
      border: 1.5px solid #e2e8f0; border-left: none; border-radius: 0 8px 8px 0;
      background: #f8fafc; font-size: .85rem; color: #64748b;
    }

    .check-btn {
      font-size: .78rem; white-space: nowrap; background: #4f46e5; color: #fff;
      border: none; border-radius: 0 8px 8px 0; padding: 0 .9rem; cursor: pointer;
    }
    .check-btn:hover { filter: brightness(1.1); }

    .hint { font-size: .75rem; margin-top: .3rem; }
    .hint.ok  { color: #10b981; }
    .hint.err { color: #ef4444; }
    .hint.muted { color: #94a3b8; }

    .btn-submit {
      background: #4f46e5; color: #fff; border: none; border-radius: 10px;
      padding: .65rem; font-size: .93rem; font-weight: 600; width: 100%; transition: filter .2s;
    }
    .btn-submit:hover { filter: brightness(1.1); color: #fff; }

    .error-box {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
      padding: .6rem .85rem; font-size: .83rem; color: #dc2626; margin-bottom: 1rem;
    }
    .login-link { text-align: center; font-size: .82rem; color: #64748b; margin-top: 1.25rem; }
    .login-link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .login-link a:hover { text-decoration: underline; }
    .divider { border: none; border-top: 1px solid #e2e8f0; margin: 1.25rem 0; }
  </style>
</head>
<body>
<div class="box">
  <div class="logo-area">
    <img src="/static/pnu_logo.jpg" alt="부산대학교">
    <h5>연구비 처리 시스템</h5>
    <small>부산대학교 구성원만 가입할 수 있어요</small>
  </div>

  {% if error %}
  <div class="error-box">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" id="reg-form">

    <!-- 아이디 -->
    <div class="mb-3">
      <label class="form-label">아이디</label>
      <div class="input-group">
        <input type="text" name="username" id="username" class="form-control"
               placeholder="영문, 숫자 3자 이상" autocomplete="off" required>
        <button type="button" class="check-btn" onclick="checkUsername()">중복확인</button>
      </div>
      <div class="hint muted" id="username-hint">영문/숫자/밑줄(_) 사용 가능</div>
    </div>

    <!-- 이메일 -->
    <div class="mb-3">
      <label class="form-label">학교 이메일</label>
      <div class="input-group">
        <input type="text" name="email_id" id="email_id" class="form-control"
               placeholder="이메일 아이디" required>
        <span class="input-group-text">@pusan.ac.kr</span>
      </div>
    </div>
    <!-- hidden full email -->
    <input type="hidden" name="email" id="email_full">

    <!-- 학번 -->
    <div class="mb-3">
      <label class="form-label">학번</label>
      <input type="text" name="student_id" class="form-control" placeholder="예: 202312345" required>
    </div>

    <hr class="divider">

    <!-- 비밀번호 -->
    <div class="mb-3">
      <label class="form-label">비밀번호</label>
      <input type="password" name="password" id="pw" class="form-control"
             placeholder="8자 이상" required oninput="checkPw()">
      <div class="hint muted" id="pw-hint">8자 이상 입력해주세요</div>
    </div>
    <div class="mb-4">
      <label class="form-label">비밀번호 확인</label>
      <input type="password" name="password2" id="pw2" class="form-control"
             placeholder="비밀번호 재입력" required oninput="checkPw2()">
      <div class="hint muted" id="pw2-hint"></div>
    </div>

    <button type="submit" class="btn-submit" onclick="buildEmail()">이메일 인증코드 받기</button>
  </form>

  <div class="login-link">이미 계정이 있으신가요? <a href="/login">로그인</a></div>
</div>

<script>
  let usernameOk = false;

  function checkUsername() {
    const val  = document.getElementById('username').value.trim();
    const hint = document.getElementById('username-hint');
    const inp  = document.getElementById('username');
    if (val.length < 3) {
      hint.textContent = '3자 이상 입력해주세요.';
      hint.className = 'hint err';
      return;
    }
    fetch(`/api/check-username?q=${encodeURIComponent(val)}`)
      .then(r => r.json())
      .then(d => {
        usernameOk = d.available;
        hint.textContent = d.message;
        hint.className = 'hint ' + (d.available ? 'ok' : 'err');
        inp.className  = 'form-control ' + (d.available ? 'is-valid' : 'is-invalid');
      });
  }

  function checkPw() {
    const v    = document.getElementById('pw').value;
    const hint = document.getElementById('pw-hint');
    if (v.length === 0) { hint.textContent = '8자 이상 입력해주세요'; hint.className = 'hint muted'; }
    else if (v.length < 8) { hint.textContent = `${8 - v.length}자 더 입력해주세요`; hint.className = 'hint err'; }
    else { hint.textContent = '✓ 사용 가능한 비밀번호'; hint.className = 'hint ok'; }
    checkPw2();
  }

  function checkPw2() {
    const v1   = document.getElementById('pw').value;
    const v2   = document.getElementById('pw2').value;
    const hint = document.getElementById('pw2-hint');
    if (!v2) { hint.textContent = ''; return; }
    if (v1 === v2) { hint.textContent = '✓ 비밀번호 일치'; hint.className = 'hint ok'; }
    else           { hint.textContent = '비밀번호가 일치하지 않습니다.'; hint.className = 'hint err'; }
  }

  function buildEmail() {
    const id = document.getElementById('email_id').value.trim();
    document.getElementById('email_full').value = id + '@pusan.ac.kr';
  }

  document.getElementById('username').addEventListener('input', () => {
    usernameOk = false;
    document.getElementById('username-hint').textContent = '중복확인을 눌러주세요';
    document.getElementById('username-hint').className = 'hint muted';
    document.getElementById('username').className = 'form-control';
  });

  document.getElementById('reg-form').addEventListener('submit', function(e) {
    buildEmail();
    if (!usernameOk) {
      e.preventDefault();
      alert('아이디 중복확인을 해주세요.');
    }
  });
</script>
</body>
</html>
