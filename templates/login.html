<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — 연구비 처리 시스템</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }
    .logo-area {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .logo-area img {
      height: 48px;
      object-fit: contain;
      margin-bottom: .75rem;
    }
    .logo-area h5 {
      font-size: .95rem;
      font-weight: 700;
      color: #475569;
      margin: 0;
    }
    .form-label { font-size: .85rem; font-weight: 600; color: #334155; }
    .form-control {
      border-radius: 8px;
      border: 1.5px solid #e2e8f0;
      font-size: .9rem;
      padding: .6rem .85rem;
    }
    .form-control:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,.1);
    }
    .btn-login {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: .65rem;
      font-size: .93rem;
      font-weight: 600;
      width: 100%;
      transition: filter .2s;
    }
    .btn-login:hover { filter: brightness(1.1); color: #fff; }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: .6rem .85rem;
      font-size: .83rem;
      color: #dc2626;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo-area">
      <img src="/static/pnu_logo.jpg" alt="부산대학교">
      <h5>연구비 처리 시스템</h5>
    </div>

    {% if error %}
    <div class="error-box">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">이메일</label>
        <input type="email" name="email" class="form-control" placeholder="example@pusan.ac.kr" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">비밀번호</label>
        <input type="password" name="password" class="form-control" placeholder="비밀번호 입력" required>
      </div>
      <button type="submit" class="btn-login">로그인</button>
    </form>
  </div>
</body>
</html>
